name: afriwonder_mobile
description: AfriWonder - mobile product parity client
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.2.2
  dio: ^5.7.0
  socket_io_client: ^2.0.3+1
  agora_rtc_engine: ^6.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.3.0
  video_player: ^2.10.1
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  flutter_local_notifications: ^17.2.3
  cached_network_image: ^3.4.1
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  connectivity_plus: ^6.0.5
  app_links: ^6.3.2
  webview_flutter: ^4.10.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  share_plus: ^10.0.2
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.11
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.13
flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - .env
