# PostgreSQL avec réplication (primary + replica)
# Usage: docker compose -f docker-compose.replication.yml up -d
# Pour les tests de réplication. En prod, utiliser un service managé (RDS, Supabase).

services:
  postgres-primary:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: afriwonder
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    command: postgres -c wal_level=replica -c max_wal_senders=3 -c wal_keep_size=1GB -c synchronous_commit=on -c full_page_writes=on
    volumes:
      - postgres_primary_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-replica:
    image: postgres:15-alpine
    restart: always
    environment:
      PGPASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
    command: >
      bash -c "
      until pg_isready -h postgres-primary -U postgres; do sleep 2; done;
      pg_basebackup -h postgres-primary -D /var/lib/postgresql/data -U postgres -P -R -X stream;
      exec postgres
      "
    depends_on:
      postgres-primary:
        condition: service_healthy

volumes:
  postgres_primary_data:
  postgres_replica_data:
