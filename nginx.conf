# Inclus dans /etc/nginx/conf.d/ (http déjà défini par l'image)
# En-têtes durcissement — ajuster la CSP si un domaine externe est requis.
server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Compression pour réseaux lents.
    gzip on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_vary on;
    gzip_types
      text/plain
      text/css
      application/json
      application/javascript
      text/xml
      application/xml
      image/svg+xml;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), microphone=(self), camera=(self), payment=()" always;
    # Stripe Checkout / Elements + Fonts Google. Ajuster si autre PSP ou iframes.
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https: wss: data:; frame-src 'self' https://js.stripe.com https://hooks.stripe.com https://m.stripe.network; media-src 'self' blob: https:; worker-src 'self' blob:;" always;

    # Service Worker et config runtime: pas de cache pour prises d'effet immédiates.
    location = /sw-custom.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
        try_files $uri =404;
    }

    location = /config.json {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # Assets hashés Vite: cache long.
    # gzip_static : sert les .gz générés par vite-plugin-compression (évite recompression CPU + meilleur débit).
    location ~* \.(js|css|woff2|png|jpg|jpeg|webp|svg|ico)$ {
        gzip_static on;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # HTML shell: no-cache pour récupérer les nouveaux bundles.
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
