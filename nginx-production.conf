# Nginx Production - AfriWonder
# Load balancer + reverse proxy API + frontend
# Copier vers /etc/nginx/conf.d/afriwonder.conf ou nginx.conf

# Upstream backend (PM2 cluster - toutes les instances sur le même port)
upstream afriwonder_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

# Rate limit zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=1r/3s;

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    # SSL — Décommenter et ajuster avec Let's Encrypt / certbot
    # ssl_certificate /etc/letsencrypt/live/votre-domaine.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/votre-domaine.com/privkey.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API backend
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://afriwonder_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # WebSocket
    location /socket.io/ {
        proxy_pass http://afriwonder_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Auth routes - rate limit strict
    location /api/auth/login {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://afriwonder_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health (pas de rate limit)
    location /health {
        proxy_pass http://afriwonder_api;
        access_log off;
    }

    location /health/ready {
        proxy_pass http://afriwonder_api;
        access_log off;
    }

    # Frontend SPA — Ajuster root vers votre build (ex. /var/www/afriwonder/dist)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

# Pour dev sans SSL : commenter le bloc listen 80 (redirect) et décommenter :
# server { listen 80; ... (copier le bloc 443 sans ssl) }
