name: Deploy Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deployment
        run: |
          if [ -n "${{ secrets.VERCEL_DEPLOY_HOOK }}" ]; then
            curl -sS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
            echo "✅ Vercel deploy triggered"
          else
            echo "⚠️ VERCEL_DEPLOY_HOOK secret not set"
            exit 1
          fi
