name: Deploy AfriWonder

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environnement cible"
        required: true
        default: production
        type: choice
        options:
          - staging
          - production
  workflow_run:
    workflows: ["CI/CD AfriWonder"]
    types: [completed]
    branches: [main]
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository_owner }}/afriwonder-backend
  FRONTEND_IMAGE: ${{ github.repository_owner }}/afriwonder-frontend

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Ne déployer que si CI a réussi (quand déclenché par workflow_run)
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push-images
    timeout-minutes: 20
    if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch') && (needs.build-and-push-images.result == 'success')

    environment: ${{ inputs.environment || 'production' }}

    steps:
      - name: Deploy over SSH with Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/afriwonder
            echo "Pulling latest images from GHCR..."
            docker compose -f docker-compose.prod.yml pull
            echo "Restarting stack..."
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            echo "Deployment finished."

