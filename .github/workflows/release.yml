name: Release SemVer

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create GitHub Release from tag
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
