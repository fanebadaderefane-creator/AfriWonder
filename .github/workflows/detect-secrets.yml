name: Detect Secrets

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Verify baseline exists
        run: test -f .secrets.baseline

      - name: Run detect-secrets hook against tracked files
        run: git ls-files -z | xargs -0 detect-secrets-hook --baseline .secrets.baseline
