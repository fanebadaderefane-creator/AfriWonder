name: CI/CD AfriWonder

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install dependencies
        working-directory: backend
        run: npm ci
      
      - name: Create test database
        working-directory: backend
        run: npm run test:create-db
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/afriwonder_test
      
      - name: Setup test database
        working-directory: backend
        run: |
          npm run db:generate
          npm run test:db
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/afriwonder_test
      
      - name: Run tests
        working-directory: backend
        run: npm run test:db:prepare && npm run test:coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/afriwonder_test
          JWT_SECRET: test-secret-key-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-key-for-ci
          NODE_ENV: test

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage/lcov.info
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  test-frontend:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint
      
      - name: Run tests
        run: npm run test:coverage
      
      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://api.afriwonder.com
      
      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Snyk Security Scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  test-e2e:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/afriwonder_test
      JWT_SECRET: test-secret-key-for-ci
      JWT_REFRESH_SECRET: test-refresh-secret-key-for-ci
      NODE_ENV: test
      # URL de l'API utilisée à la fois par le frontend (Vite) et par les tests Playwright
      VITE_API_URL: http://127.0.0.1:3000/api
      PLAYWRIGHT_API_URL: http://127.0.0.1:3000/api

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Create test database
        working-directory: backend
        run: npm run test:create-db
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/afriwonder_test

      - name: Prepare test database
        working-directory: backend
        run: |
          npm run db:generate
          npm run test:db
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/afriwonder_test

      - name: Start backend API
        working-directory: backend
        run: |
          npm run dev &
          echo "Backend started"

      - name: Start frontend (Vite dev server)
        env:
          VITE_API_URL: http://127.0.0.1:3000/api
        run: |
          npm run dev -- --host 0.0.0.0 --port 5173 &
          echo "Frontend started"

      - name: Wait for frontend to be ready
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5173 > /dev/null; then
              echo "Frontend is up"
              exit 0
            fi
            echo "Waiting for frontend..."
            sleep 2
          done
          echo "Frontend did not start in time"
          exit 1

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/playwright
      - name: Upload Playwright traces and videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-videos
          path: test-results/

  # Alerte si CI échoue sur main (configurer CI_ALERT_WEBHOOK_URL dans GitHub Secrets)
  notify-on-failure:
    runs-on: ubuntu-latest
    if: failure() && github.ref == 'refs/heads/main'
    needs: [test-backend, test-frontend, test-e2e]
    steps:
      - name: Alert CI failure
        run: |
          if [ -n "${{ secrets.CI_ALERT_WEBHOOK_URL }}" ]; then
            curl -sS -X POST "${{ secrets.CI_ALERT_WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -d "{\"text\":\"⚠️ AfriWonder CI échoué\",\"run_url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
          fi
        continue-on-error: true

