name: CI/CD AfriWonder

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  # Lancer à la main : Actions → CI/CD AfriWonder → Run workflow
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: afriwonder-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install dependencies
        working-directory: backend
        run: npm ci
      
      - name: Wait for Postgres
        run: sleep 5

      - name: Create test database
        working-directory: backend
        run: npm run test:create-db
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/afriwonder_test
      
      - name: Setup test database
        working-directory: backend
        run: |
          npm run db:generate
          npm run test:db
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/afriwonder_test
      
      - name: Prepare DB for tests
        working-directory: backend
        run: npm run test:db:prepare
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/afriwonder_test
      
      - name: Run tests
        working-directory: backend
        run: npm run test:coverage
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/afriwonder_test
          JWT_SECRET: test-secret-key-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-key-for-ci
          NODE_ENV: test
          CORS_ORIGIN: http://localhost:5173
          FRAUD_MAX_SUCCESS_IN_WINDOW: "100"
          FRAUD_MAX_PAYMENT_AMOUNT: "999999999"
          SUPER_ADMIN_EMAIL: admin@test.example.com

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage/lcov.info
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

      - name: npm audit (backend)
        working-directory: backend
        run: npm audit --audit-level=high
        continue-on-error: true

  test-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm run test:ci:frontend
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://api.afriwonder.com

      - name: npm audit (frontend)
        run: npm audit --audit-level=high
        continue-on-error: true

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install root
        run: npm ci
      - name: Install backend
        working-directory: backend
        run: npm ci
      - name: Security audit
        run: node scripts/security-audit.js
        continue-on-error: true

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Snyk Security Scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  test-e2e:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    timeout-minutes: 40

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/afriwonder_test
      JWT_SECRET: test-secret-key-for-ci
      JWT_REFRESH_SECRET: test-refresh-secret-key-for-ci
      NODE_ENV: test
      # URL de l'API utilisée à la fois par le frontend (Vite) et par les tests Playwright
      VITE_API_URL: http://127.0.0.1:3000/api
      PLAYWRIGHT_API_URL: http://127.0.0.1:3000/api

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Create test database
        working-directory: backend
        run: npm run test:create-db
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/afriwonder_test

      - name: Prepare test database
        working-directory: backend
        run: |
          npm run db:generate
          npm run test:db
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/afriwonder_test

      - name: Start backend API
        working-directory: backend
        run: |
          npm run dev &
          echo "Backend started"

      - name: Wait for backend API to be ready
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/health > /dev/null; then
              echo "Backend is up"
              exit 0
            fi
            echo "Waiting for backend..."
            sleep 2
          done
          echo "Backend did not start in time"
          exit 1

      - name: Verify ads/feed connectivity
        run: node scripts/verify-ads-feed-connectivity.js
        env:
          API_URL: http://127.0.0.1:3000

      - name: Start frontend (Vite dev server)
        env:
          VITE_API_URL: http://127.0.0.1:3000/api
        run: |
          npm run dev -- --host 0.0.0.0 --port 5173 &
          echo "Frontend started"

      - name: Wait for frontend to be ready
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5173 > /dev/null; then
              echo "Frontend is up"
              exit 0
            fi
            echo "Waiting for frontend..."
            sleep 2
          done
          echo "Frontend did not start in time"
          exit 1

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Install Playwright deps only (when cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Run Playwright E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
      - name: Upload Playwright traces and videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-videos
          path: test-results/

  # Alerte si CI échoue sur main (configurer CI_ALERT_WEBHOOK_URL dans GitHub Secrets)
  notify-on-failure:
    runs-on: ubuntu-latest
    if: failure() && github.ref == 'refs/heads/main'
    needs: [test-backend, test-frontend, test-e2e]
    steps:
      - name: Alert CI failure
        run: |
          if [ -n "${{ secrets.CI_ALERT_WEBHOOK_URL }}" ]; then
            curl -sS -X POST "${{ secrets.CI_ALERT_WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -d "{\"text\":\"⚠️ AfriWonder CI échoué\",\"run_url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
          fi
        continue-on-error: true

