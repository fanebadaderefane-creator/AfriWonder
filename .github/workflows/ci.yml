name: CI/CD AfriWonder

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  # Lancer à la main : Actions → CI/CD AfriWonder → Run workflow
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: afriwonder-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Manuel durabilité ch.4 — max 400 lignes modifiées (additions + déletions).
  pr-line-budget:
    name: Taille PR (≤ 400 lignes)
    runs-on: ubuntu-latest
    steps:
      - name: Vérifier la taille de la PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.setFailed('Contexte pull_request manquant');
              return;
            }
            const total = (pr.additions || 0) + (pr.deletions || 0);
            const max = 400;
            if (total > max) {
              core.setFailed(
                `PR > ${max} lignes modifiées (${total} = +${pr.additions} -${pr.deletions}). Découper (manuel ch.4).`
              );
            } else {
              core.info(`PR OK : ${total} lignes (≤ ${max})`);
            }
      - name: Push (hors PR)
        if: github.event_name != 'pull_request'
        run: echo "Pas de garde taille sur push direct vers main/develop."

  # Gate P0 : le code DOIT typer et linter proprement avant toute autre étape.
  # Ajouté suite à l'audit QA (docs/AUDIT_QA_LAUNCH_READY.md) — empêche une
  # régression type comme `video.service.ts:limitValue` (crash runtime) de
  # repasser en prod.
  typecheck-and-lint:
    name: Typecheck + lint (gate bloquant)
    needs: [pr-line-budget]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Install mobile deps
        working-directory: frontend
        run: npm ci

      - name: Quality gates (standards + typecheck + lint)
        env:
          ENGINEERING_STANDARDS_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: npm run verify:quality-gates

  # Tests unitaires Expo / React Native (Vitest) — exigence ch.2 « tout PR passe les tests ».
  test-mobile-expo:
    name: Tests unitaires (Expo)
    needs: typecheck-and-lint
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install mobile deps
        working-directory: frontend
        run: npm ci
      # Ch.2 : couverture ≥ 70 % sur le périmètre défini dans `frontend/vitest.config.ts`.
      # Ch.2.4 : cible durée &lt; 5 min — avertissement si dépassé (comme le job backend Jest).
      - name: Vitest (mobile + couverture)
        working-directory: frontend
        shell: bash
        run: |
          set -euo pipefail
          start=$(date +%s)
          npm run test:coverage
          end=$(date +%s)
          dur=$((end-start))
          echo "Durée suite Vitest mobile (npm run test:coverage) : ${dur}s (cible < 300s, manuel ch.2.4)"
          if [ "$dur" -gt 300 ]; then
            echo "::warning::Suite unitaires Expo / Vitest a dépassé 5 min (${dur}s). Optimiser la suite ou le runner."
          fi
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          CI: 'true'

      - name: npm audit (mobile)
        working-directory: frontend
        run: npm audit --audit-level=high

  test-backend:
    needs: typecheck-and-lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install dependencies
        working-directory: backend
        run: npm ci
      
      - name: Wait for Postgres
        run: sleep 5

      - name: Create test database
        working-directory: backend
        run: npm run test:create-db
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/afriwonder_test
      
      - name: Setup test database
        working-directory: backend
        run: |
          npm run db:generate
          npm run test:db
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/afriwonder_test
      
      - name: Prepare DB for tests
        working-directory: backend
        run: npm run test:db:prepare
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/afriwonder_test
      
      # Ch.2.4 : durée max 5 min pour la suite Jest (hors webhooks ci-dessous).
      - name: Run tests (Jest + couverture, cible < 5 min)
        working-directory: backend
        shell: bash
        run: |
          set -euo pipefail
          start=$(date +%s)
          npm run test:coverage
          end=$(date +%s)
          dur=$((end-start))
          echo "Durée suite Jest (npm run test:coverage) : ${dur}s (cible < 300s, manuel ch.2.4)"
          if [ "$dur" -gt 300 ]; then
            echo "::warning::Suite unitaires backend Jest a dépassé 5 min (${dur}s). Cible manuel ch.2.4 : optimiser la suite (durées variables sur runners CI)."
          fi
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/afriwonder_test
          JWT_SECRET: test-secret-key-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-key-for-ci
          NODE_ENV: test
          CORS_ORIGIN: http://localhost:5173
          FRAUD_MAX_SUCCESS_IN_WINDOW: "100"
          FRAUD_MAX_PAYMENT_AMOUNT: "999999999"
          SUPER_ADMIN_EMAIL: admin@test.example.com

      - name: Orange Money webhook integration test (sandbox path)
        working-directory: backend
        run: npx jest src/payments/__tests__/orange-money.webhook.test.ts --config jest.config.js --runInBand
        env:
          NODE_ENV: test
          ORANGE_MONEY_ENV: production
          ORANGE_MONEY_WEBHOOK_SECRET: ci-orange-webhook-secret

      - name: Stripe webhook integration test
        working-directory: backend
        run: npx jest src/payments/__tests__/stripe.webhook.test.ts --config jest.config.js --runInBand
        env:
          NODE_ENV: test

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage/lcov.info
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

      - name: npm audit (backend)
        working-directory: backend
        run: npm audit --audit-level=high

  test-frontend:
    needs: typecheck-and-lint
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Release readiness (package version vs CHANGELOG)
        run: npm run verify:release-readiness

      - name: Run linter
        run: npm run lint

      - name: Enforce root docs policy
        run: npm run verify:root-docs

      # Ch.2.2 : couverture ≥ 70 % sur le périmètre `coverage.include` de `vitest.config.js` (PWA Vite).
      - name: Run tests (Vitest + couverture)
        run: npm run test:coverage
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          CI: 'true'

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://api.afriwonder.com

      - name: npm audit (frontend)
        run: npm audit --audit-level=high

  security-audit:
    needs: [pr-line-budget]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install root
        run: npm ci
      - name: Install backend
        working-directory: backend
        run: npm ci
      - name: Security audit
        run: node scripts/security-audit.js

  # Optionnel : sans SNYK_TOKEN on ne lance pas Snyk (évite `if: secrets.…` au niveau job, mal supporté par les linters de workflow).
  security-scan:
    needs: [pr-line-budget]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Détecter SNYK_TOKEN
        id: snyk_token
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -n "$SNYK_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "SNYK_TOKEN absent — scan Snyk ignoré (fork ou secret non configuré)."
          fi
      - name: Snyk Security Scan
        if: steps.snyk_token.outputs.present == 'true'
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  test-e2e:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-mobile-expo]
    timeout-minutes: 55

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/afriwonder_test
      JWT_SECRET: test-secret-key-for-ci
      JWT_REFRESH_SECRET: test-refresh-secret-key-for-ci
      NODE_ENV: test
      # URL de l'API utilisée à la fois par le frontend (Vite) et par les tests Playwright
      VITE_API_URL: http://127.0.0.1:3000/api
      PLAYWRIGHT_API_URL: http://127.0.0.1:3000/api

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Create test database
        working-directory: backend
        run: npm run test:create-db
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/afriwonder_test

      - name: Prepare test database
        working-directory: backend
        run: |
          npm run db:generate
          npm run test:db
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/afriwonder_test

      - name: Start backend API
        working-directory: backend
        run: |
          npm run dev &
          echo "Backend started"

      - name: Wait for backend API to be ready
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/health > /dev/null; then
              echo "Backend is up"
              exit 0
            fi
            echo "Waiting for backend..."
            sleep 2
          done
          echo "Backend did not start in time"
          exit 1

      - name: Verify ads/feed connectivity
        run: node scripts/verify-ads-feed-connectivity.js
        env:
          API_URL: http://127.0.0.1:3000

      - name: Start frontend (Vite dev server)
        env:
          VITE_API_URL: http://127.0.0.1:3000/api
        run: |
          npm run dev -- --host 0.0.0.0 --port 5173 &
          echo "Frontend started"

      - name: Wait for frontend to be ready
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5173 > /dev/null; then
              echo "Frontend is up"
              exit 0
            fi
            echo "Waiting for frontend..."
            sleep 2
          done
          echo "Frontend did not start in time"
          exit 1

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Install Playwright deps only (when cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Run Playwright E2E tests
        run: npm run test:e2e:ci

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
      - name: Upload Playwright traces and videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-videos
          path: test-results/

  # Déploie sur Vercel quand la CI passe sur main
  deploy-vercel:
    runs-on: ubuntu-latest
    if: success() && github.ref == 'refs/heads/main'
    needs: [test-backend, test-frontend, test-mobile-expo, test-e2e]
    steps:
      - name: Trigger Vercel deployment
        run: |
          if [ -n "${{ secrets.VERCEL_DEPLOY_HOOK }}" ]; then
            curl -sS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
            echo "Vercel deploy triggered"
          else
            echo "VERCEL_DEPLOY_HOOK secret not set - skip"
          fi
        continue-on-error: true

  # Alerte si CI échoue sur main (configurer CI_ALERT_WEBHOOK_URL dans GitHub Secrets)
  notify-on-failure:
    runs-on: ubuntu-latest
    if: failure() && github.ref == 'refs/heads/main'
    needs: [test-backend, test-frontend, test-mobile-expo, test-e2e]
    steps:
      - name: Alert CI failure
        run: |
          if [ -n "${{ secrets.CI_ALERT_WEBHOOK_URL }}" ]; then
            curl -sS -X POST "${{ secrets.CI_ALERT_WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -d "{\"text\":\"⚠️ AfriWonder CI échoué\",\"run_url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
          fi
        continue-on-error: true

