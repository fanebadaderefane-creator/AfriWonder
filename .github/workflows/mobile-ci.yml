# CI ciblée Expo — le code vit dans `frontend/` ; `mobile-afriwonder/` relaie npm.
name: Mobile CI (Expo)

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - 'mobile-afriwonder/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - 'mobile-afriwonder/**'
      - '.github/workflows/mobile-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mobile-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mobile-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install (frontend)
        working-directory: frontend
        run: npm ci

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Unit tests (Vitest)
        working-directory: frontend
        run: npm test

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Alias mobile-afriwonder (scripts → frontend)
        working-directory: mobile-afriwonder
        run: npm run typecheck
