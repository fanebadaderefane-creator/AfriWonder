<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <!-- Force portrait orientation on mobile -->
    <meta name="screen-orientation" content="portrait" />
    <meta name="description" content="La première Super-app vidéo africaine connectant créateurs, commerçants et communauté, optimisée pour les faibles débits, disponible dans toutes les langues locales avec paiements mobiles intégrés." />
    
    <!-- Open Graph / Facebook — URL canonique pour SEO et partage (afriwonder.com ou Vercel) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://afriwonder.com/" />
    <meta property="og:title" content="AfriWonder - Super App Africaine" />
    <meta property="og:description" content="La première Super-app vidéo africaine connectant créateurs, commerçants et communauté, optimisée pour les faibles débits, disponible dans toutes les langues locales avec paiements mobiles intégrés." />
    <meta property="og:image" content="https://afriwonder.com/icon-512.png" />
    <meta property="og:site_name" content="AfriWonder" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://afriwonder.com/" />
    <meta name="twitter:title" content="AfriWonder - Super App Africaine" />
    <meta name="twitter:description" content="La première Super-app vidéo africaine connectant créateurs, commerçants et communauté, optimisée pour les faibles débits, disponible dans toutes les langues locales avec paiements mobiles intégrés." />
    <meta name="twitter:image" content="https://afriwonder.com/icon-512.png" />
    
    <!-- Theme Colors (bleu AfriWonder pour barre de statut) -->
    <meta name="theme-color" content="#2563eb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1d4ed8" media="(prefers-color-scheme: dark)" />
    
    <!-- Mobile Web App -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="AfriWonder" />
    
    <!-- iOS / iPhone -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AfriWonder" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="72x72" href="/icon-72.png" />
    <link rel="apple-touch-icon" sizes="96x96" href="/icon-96.png" />
    <link rel="apple-touch-icon" sizes="128x128" href="/icon-128.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icon-144.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="384x384" href="/icon-384.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" sizes="1024x1024" href="/icon-1024.png" />
    <!-- Splash screen iOS (réduit écran blanc au lancement PWA) -->
    <link rel="apple-touch-startup-image" href="/icon-512.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/icon-512.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)" />
    <link rel="apple-touch-startup-image" href="/icon-512.png" media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3)" />
    
    <!-- iPad -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-touch-fullscreen" content="yes" />
    
    <!-- Microsoft / Windows -->
    <meta name="msapplication-TileColor" content="#2563eb" />
    <meta name="msapplication-TileImage" content="/icon-144.png" />
    <meta name="msapplication-config" content="/browserconfig.xml" />
    
    <!-- Android Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icon-192.png" />
    
    <title>AfriWonder - Super App Africaine</title>
  </head>
  <body>
    <!-- Viewport mobile/PWA : même hauteur qu’écran dès le premier paint (qualité = Chrome) -->
    <script>
      (function() {
        var h = (window.visualViewport && window.visualViewport.height) || window.innerHeight || 0;
        document.documentElement.style.setProperty('--app-vh', (h * 0.01) + 'px');
      })();
    </script>
    <div id="root"></div>
    <!-- Désactiver le service worker en développement -->
    <script>
      if ('serviceWorker' in navigator && (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
          }
        });
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
