# Scaling 1M utilisateurs - AfriWonder
# Usage: docker compose -f docker-compose.prod.yml -f docker-compose.scaling-1m.yml up -d
# Surcharge les replicas et ressources pour haute charge

services:
  backend:
    deploy:
      replicas: 10
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  postgres:
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G

  redis:
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
