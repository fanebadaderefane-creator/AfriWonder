# Configuration Railway pour AfriWonder - Backend uniquement
# IMPORTANT : Root Directory doit rester VIDE dans Railway Settings.
# Ce Dockerfile build depuis la racine du repo (COPY backend/...).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.backend"

[deploy]
startCommand = "sh scripts/start-with-migrate.sh"
healthcheckPath = "/health"
healthcheckTimeout = 600
