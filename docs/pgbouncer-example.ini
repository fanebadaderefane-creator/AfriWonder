; Exemple PgBouncer — à adapter et placer où PgBouncer le charge (souvent /etc/pgbouncer/pgbouncer.ini)

[databases]
; Nom logique utilisé par les clients ; remplacez par votre DB réelle
afriwonder = host=127.0.0.1 port=5432 dbname=afriwonder

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
; Ou auth_user + auth_query si vous utilisez auth_query

; Pool : mode transaction = une connexion client = une connexion serveur par transaction (recommandé pour Prisma)
pool_mode = transaction
max_client_conn = 1000
default_pool_size = 25

; Connexion réelle vers PostgreSQL (à adapter)
; Les identifiants sont dans auth_file ou via auth_query
; server_reset_query = DISCARD ALL

[users]
; Si vous utilisez auth_file, format : "user" "password"
; Sinon configurer auth_query dans [pgbouncer]
