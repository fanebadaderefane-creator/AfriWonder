# Exemple Nginx : load balancer avec sticky sessions pour Socket.io
# À adapter selon votre OS (paths, nombre de backends, ports).
# Utiliser quand vous hébergez vous-même plusieurs instances du backend AfriWonder.

upstream afriwonder_backend {
    # Sticky par IP : même client → même serveur (utile pour Socket.io)
    ip_hash;

    # Ou sticky par cookie Socket.io (décommenter et commenter ip_hash si préféré) :
    # hash $cookie_io consistent;

    server 127.0.0.1:3000;
    server 127.0.0.1:3001;
    server 127.0.0.1:3002;
    # Ajouter d'autres serveurs (autres machines : IP:PORT)
}

server {
    listen 80;
    server_name api.afriwonder.com;   # Remplacer par votre domaine

    # Augmenter timeouts pour uploads longs (vidéos)
    proxy_connect_timeout 310s;
    proxy_send_timeout 310s;
    proxy_read_timeout 310s;

    location / {
        proxy_pass http://afriwonder_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket
        proxy_set_header X-Forwarded-Host $host;
    }
}

