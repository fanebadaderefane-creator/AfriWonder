# Config principale pour conteneurs non-root (ex. Cron Render) : pid + caches sous /tmp.
# Pas de directive `user` : le conteneur peut tourner avec un UID imposé par la plateforme.
# Le bloc server reste dans /etc/nginx/conf.d/default.conf (nginx.conf du repo).
worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /dev/stdout combined;

    client_body_temp_path /tmp/nginx/client_temp 1 2;
    proxy_temp_path /tmp/nginx/proxy_temp 1 2;
    fastcgi_temp_path /tmp/nginx/fastcgi_temp 1 2;
    uwsgi_temp_path /tmp/nginx/uwsgi_temp 1 2;
    scgi_temp_path /tmp/nginx/scgi_temp 1 2;

    sendfile on;
    keepalive_timeout 65;

    include /etc/nginx/conf.d/*.conf;
}
